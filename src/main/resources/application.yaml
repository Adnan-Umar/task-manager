spring:
  application:
    name: task-manager

  datasource:
    url: jdbc:postgresql://localhost:5432/task-manager
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect


